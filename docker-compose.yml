services:
  mcp-server:
    build: .
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - default
      - wikijs-net

networks:
  wikijs-net:
    external: true
    name: ${WIKIJS_NETWORK:-wikijs_default}  # set WIKIJS_NETWORK in .env to match your Wiki.js compose network
